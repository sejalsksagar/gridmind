services:
  - type: web
    name: gridmind-api
    env: python
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/v1/health
    envVars:
      - key: CORS_ORIGINS
        value: "https://gridmind.vercel.app"
      - key: USE_MOCK_MODELS
        value: "false"
      - key: APP_ENV
        value: "production"
